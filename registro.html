<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta name="description" content="Sistema simples de cadastro de clientes">

<meta name="author" content="Seu Nome">
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>

    <link rel="icon" type="image/png" href="favicon.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container mt-5">
    <div class="row justify-content-center">

        <div class="col-md-5">

            <div class="card shadow">

                <div class="card-header bg-success text-white text-center">
                    <h3>Cadastrar Usuário</h3>
                </div>

                <div class="card-body">

                    <form id="cadastroForm">

                        <div class="mb-3">
                            <label>Nome</label>
                            <input type="text" id="nome" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label>Email</label>
                            <input type="email" id="emailCadastro" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label>Senha</label>
                            <input type="password" id="senhaCadastro" class="form-control" required>
                        </div>

                        <button class="btn btn-success w-100">
                            
                            Cadastrar
                        </button>

                    </form>

                    <hr>

                    <a href="index.html" class="btn btn-primary w-100">
                        Voltar para Login
                    </a>

                </div>

            </div>

        </div>

    </div>
</div>

<script src="script.js"></script>
</body>
</html>
